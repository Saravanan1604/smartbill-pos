name: Keep Backend Awake

# Pings the Render backend so its free tier doesn't sleep (which causes the
# 30-60s cold-start delay on the first page load).
#
# NOTE: GitHub heavily THROTTLES scheduled workflows on low-activity repos,
# so a "*/10 * * * *" cron often only fires every few HOURS. To compensate,
# each run pings in a loop for ~55 minutes. For reliable 24/7 warmth, use an
# external pinger (cron-job.org / UptimeRobot, every 5 min) — that is the
# proper free fix.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - name: Keep backend warm for ~55 minutes
        run: |
          URL="https://smartbill-backend-al6t.onrender.com/api/health"
          # 12 pings, 5 minutes apart ≈ 55 minutes of warmth per run
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "$(date -u) ping #$i -> HTTP $code"
            if [ "$i" -lt 12 ]; then sleep 300; fi
          done
          echo "Done keeping backend warm."
